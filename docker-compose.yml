version: '3.8'

services:
  openaudit:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAUDIT_ENV=production
      - OPENAUDIT_PORT=8000
      - OPENAUDIT_RULES=/app/src/openaudit/data/rules.yaml
    volumes:
      - ./scans:/app/scans
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
